# --- Tmux Configuration
# --- Author: Gunther Weissenbaeck
# --- Date: 2025-03-24

# -----------------------------------------------------------------------------------
# --- Reload configuration ---
# -----------------------------------------------------------------------------------
unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloading Config ..."

# C-a Is Not Acceptable -- Vim Uses It
set-option -g prefix C-b

# -----------------------------------------------------------------------------------
# --- Mouse Switched On ---
# -----------------------------------------------------------------------------------
set -g mouse on

# -----------------------------------------------------------------------------------
# --- # Number windows and panes starting at 1 ---
# -----------------------------------------------------------------------------------
set -g base-index 1
set -g pane-base-index 1

# -----------------------------------------------------------------------------------
# --- Statusbar On Bottom ---
# -----------------------------------------------------------------------------------
set-option -g status-position bottom

# -----------------------------------------------------------------------------------
# --- Set Window Split Keys ---
# -----------------------------------------------------------------------------------
bind-key v split-window -h
bind-key b split-window

# -----------------------------------------------------------------------------------
# --- Pane Traversal ---
# -----------------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -----------------------------------------------------------------------------------
# --- Copy-Paste Mode ---
# -----------------------------------------------------------------------------------
bind y copy-mode
bind a paste-buffer

# -----------------------------------------------------------------------------------
# --- Sync Panes ---
# -----------------------------------------------------------------------------------
bind S setw synchronize-panes on
bind A setw synchronize-panes off

# -----------------------------------------------------------------------------------
# --- Plugin Manager ---
# -----------------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible' # optional recommended
#
# -----------------------------------------------------------------------------------
# --- Tmux Resurrect ---
# -----------------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-processes 'ssh'

# -----------------------------------------------------------------------------------
# --- Plugin Gruvbox ---
# -----------------------------------------------------------------------------------
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark256' # or 'dark256', 'light', 'light256'

# -----------------------------------------------------------------------------------
# --- Plugin Nordtheme ---
# -----------------------------------------------------------------------------------
# set -g @plugin 'nordtheme/tmux'
# set -g @nord_tmux_show_status_content '0'

# -----------------------------------------------------------------------------------
# --- Plugin tmux-sensible ---
# -----------------------------------------------------------------------------------
# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Upgrade $TERM
set -g default-terminal "screen-256color"

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# -----------------------------------------------------------------------------------
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# -----------------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
